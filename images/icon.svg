<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Document shape -->
  <rect x="52" y="36" width="152" height="184" rx="12" ry="12" fill="white" opacity="0.95"/>

  <!-- Text lines on document -->
  <rect x="76" y="64" width="80" height="8" rx="4" fill="#93c5fd"/>
  <rect x="76" y="82" width="104" height="8" rx="4" fill="#bfdbfe"/>
  <rect x="76" y="100" width="60" height="8" rx="4" fill="#bfdbfe"/>

  <!-- Citation highlight -->
  <rect x="72" y="122" width="112" height="24" rx="6" fill="#dbeafe"/>
  <text x="128" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#1e40af" text-anchor="middle">[@cite, p. 1]</text>

  <!-- Bibliography lines -->
  <rect x="76" y="160" width="96" height="6" rx="3" fill="#93c5fd"/>
  <rect x="76" y="174" width="104" height="6" rx="3" fill="#bfdbfe"/>
  <rect x="76" y="188" width="72" height="6" rx="3" fill="#bfdbfe"/>

  <!-- @ symbol accent -->
  <circle cx="204" cy="52" r="28" fill="#f59e0b" opacity="0.9"/>
  <text x="204" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">@</text>
</svg>
